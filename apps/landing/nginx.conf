server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1000;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Main landing
    location = / {
        try_files /main.html /index.html =404;
    }

    # Per-app landing pages (healthlens/, future apps/)
    location ~ ^/([a-z0-9-]+)/?$ {
        try_files /$1/index.html /$1.html =404;
    }

    # Static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SEO files
    location = /robots.txt { add_header Content-Type text/plain; }
    location = /sitemap.xml { add_header Content-Type application/xml; }
}
