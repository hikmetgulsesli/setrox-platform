version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: setrox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: setrox
      POSTGRES_PASSWORD: setrox_password
      POSTGRES_DB: setrox_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U setrox -d setrox_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: setrox-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: setrox-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://setrox:setrox_password@postgres:5432/setrox_db?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret-min-32-chars-long-please}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-min-32-chars-please}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      CORS_ORIGIN: ${CORS_ORIGIN:-https://admin.setrox.com.tr,https://lens.setrox.com.tr}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@setrox.com.tr}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-on-first-login}
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    container_name: setrox-admin
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

  landing:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
    container_name: setrox-landing
    restart: unless-stopped
    ports:
      - "4173:80"

volumes:
  postgres_data:
  redis_data:
